<!--
Gate Sofia Digital Twin Validation Survey
Single-file web app — deployable to Netlify, no build step required
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gate Sofia Digital Twin — Validation Survey</title>
  <meta name="description" content="Help us improve the Gate Sofia Digital Twin. Survey, feedback, and validation app." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52%' x='10%' font-size='48'>🏢</text></svg>">
  <style>
    :root {
      --bg: #0c2e50;
      --surface: #ffffff;
      --surface-glass: rgba(255,255,255,0.97);
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #16a34a;
      --text: #1e293b;
      --muted: #64748b;
      --star-empty: #cbd5e1;
      --star-filled: #f59e0b;
      --step-bar: #2563eb;
      --admin-bar: #f1f5f9;
      --admin-accent: #2563eb;
      --shadow: 0 4px 24px 0 rgba(15,23,42,0.10);
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    #app {
      max-width: 900px;
      margin: 40px auto;
      padding: 48px 64px 64px 64px;
      min-height: auto;
      box-sizing: border-box;
      position: relative;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    @media (max-width: 960px) {
      #app { padding: 36px 40px 48px 40px; }
    }
    @media (max-width: 600px) {
      #app { padding: 20px 16px 32px 16px; margin: 0; border-radius: 0; box-shadow: none; }
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      justify-content: flex-start;
    }
    .logo-area .logo {
      font-size: 2.2rem;
      margin-right: 6px;
    }
    .logo-area .brand {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--accent);
    }
    .logo-area .subtitle {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: 2px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
      position: relative;
    }
    .progress-bar-inner {
      height: 100%;
      background: var(--step-bar);
      width: 0%;
      transition: width 0.4s cubic-bezier(.4,1,.6,1);
    }
    .step-indicator {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .step {
      animation: stepIn 0.3s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }
    @media (max-width: 720px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }
    .role-card {
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      cursor: pointer;
      transition: border 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 80px;
      user-select: none;
    }
    .role-card.selected {
      border: 2px solid var(--accent);
      background: rgba(37,99,235,0.05);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(37,99,235,0.12);
    }
    .role-card:hover {
      border: 2px solid var(--accent);
      background: rgba(37,99,235,0.04);
      transform: translateY(-1px);
      box-shadow: 0 2px 10px rgba(37,99,235,0.10);
    }
    .role-card .role-icon {
      font-size: 1.4rem;
      margin-bottom: 2px;
    }
    .role-card .role-title {
      font-weight: 600;
      font-size: 0.97rem;
      color: var(--text);
    }
    .role-card .role-desc {
      font-size: 0.88rem;
      color: var(--muted);
    }
    .input-row {
      margin: 12px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-row input[type="text"], .input-row input[type="email"], .input-row textarea, .input-row select {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      transition: border 0.15s;
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
    }
    .input-row input[type="text"]:focus, .input-row input[type="email"]:focus, .input-row textarea:focus, .input-row select:focus {
      border: 1.5px solid var(--accent);
      background: #fff;
    }
    .input-row label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2px;
      font-weight: 500;
    }
    .button-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 32px;
      gap: 12px;
    }
    .button {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 13px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      outline: none;
      min-width: 120px;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .button:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
    }
    .button:not(:disabled):hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }
    .back-btn {
      position: absolute;
      left: 0;
      top: 24px;
      background: none;
      color: var(--accent);
      border: none;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0 8px;
      transition: color 0.15s;
      z-index: 10;
    }
    .back-btn:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .footer-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 28px;
      text-align: center;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .gallery-img {
      width: 100%;
      max-width: 540px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: #f1f5f9;
      object-fit: cover;
      min-height: 220px;
      max-height: 340px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.06);
    }
    .gallery-caption {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
      text-align: center;
    }
    .gallery-arrows {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 4px;
    }
    .highlight-cards {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 4px;
    }
    .highlight-card {
      min-width: 190px;
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
    }
    .highlight-card .icon {
      font-size: 1.3rem;
      margin-bottom: 2px;
    }
    .highlight-card .title {
      font-weight: 600;
      font-size: 1rem;
    }
    .highlight-card .desc {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .task-card {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px 18px 14px 18px;
      margin-bottom: 18px;
    }
    .task-progress {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-align: right;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .task-btns {
      display: flex;
      gap: 10px;
      margin: 14px 0 8px 0;
      flex-wrap: wrap;
    }
    .task-btn {
      flex: 1;
      min-width: 120px;
      background: #ffffff;
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border 0.15s, transform 0.12s;
      font-family: inherit;
    }
    .task-btn.selected, .task-btn:focus {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      outline: none;
      transform: translateY(-1px);
    }
    .task-btn:not(.selected):hover {
      background: rgba(37,99,235,0.06);
      border-color: var(--accent);
      color: var(--accent);
    }
    .radio-row {
      display: flex;
      gap: 18px;
      margin: 8px 0 0 0;
      flex-wrap: wrap;
    }
    .radio-label {
      font-size: 14px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-right: 8px;
    }
    .star-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0 0 0;
    }
    .star {
      font-size: 24px;
      color: var(--star-empty);
      cursor: pointer;
      transition: color 0.1s;
      user-select: none;
    }
    .star.filled {
      color: var(--star-filled);
    }
    .star:hover, .star:focus {
      color: var(--star-filled);
      outline: none;
    }
    .feature-card {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px 12px 14px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .feature-card .icon {
      font-size: 1.2rem;
      margin-bottom: 2px;
    }
    .feature-card .title {
      font-weight: 600;
      font-size: 1rem;
    }
    .feature-card .desc {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .dropdown-row {
      margin: 18px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dropdown-row label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2px;
      font-weight: 500;
    }
    .dropdown-row select {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      transition: border 0.15s;
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
    }
    .dropdown-row select:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .emoji-row {
      display: flex;
      gap: 16px;
      margin: 12px 0 0 0;
      align-items: center;
      justify-content: center;
    }
    .emoji-btn {
      font-size: 2rem;
      background: none;
      border: 2px solid transparent;
      border-radius: 50%;
      padding: 6px 8px;
      cursor: pointer;
      transition: border 0.15s, background 0.15s, transform 0.12s;
      outline: none;
    }
    .emoji-btn.selected {
      border: 2px solid var(--accent);
      background: rgba(37,99,235,0.08);
      transform: scale(1.15);
    }
    .emoji-btn:not(.selected):hover {
      background: rgba(37,99,235,0.06);
      transform: scale(1.1);
    }
    .emoji-label {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
      min-height: 18px;
      font-weight: 500;
    }
    .ai-summary-card {
      background: rgba(37,99,235,0.05);
      border: 1.5px solid rgba(37,99,235,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .ai-summary-title {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .ai-summary-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
    }
    .thankyou-check {
      font-size: 52px;
      color: var(--green);
      margin-bottom: 12px;
      text-align: center;
    }
    .thankyou-heading {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 6px;
      text-align: center;
      color: var(--text);
    }
    .thankyou-sub {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 24px;
      text-align: center;
    }
    .thankyou-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .thankyou-stat {
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 600;
      text-align: center;
      background: rgba(37,99,235,0.06);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 10px;
      padding: 10px 18px;
    }
    .share-btn {
      background: rgba(37,99,235,0.08);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 11px 22px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.12s;
      margin: 0 auto 18px auto;
      display: block;
      text-align: center;
      text-decoration: none;
    }
    .share-btn:hover {
      background: var(--accent);
      color: #ffffff;
      transform: translateY(-1px);
    }
    .notify-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }
    .notify-row input[type="email"] {
      width: 220px;
      font-size: 14px;
      padding: 9px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .notify-row input[type="email"]:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .notify-row .button {
      min-width: 80px;
      padding: 9px 16px;
      font-size: 0.95rem;
    }
    .resume-banner {
      background: rgba(37,99,235,0.06);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: space-between;
      animation: stepIn 0.3s ease forwards;
    }
    .resume-banner .button {
      min-width: 90px;
      padding: 9px 16px;
      font-size: 0.95rem;
    }
    /* Admin styles */
    .admin-bar {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #ffffff;
      padding: 16px 22px;
      border-radius: 12px;
      margin-bottom: 22px;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 16px rgba(37,99,235,0.18);
    }
    .admin-bar-title { flex: 1; }
    .admin-bar-meta { font-size: 12px; font-weight: 400; opacity: 0.8; margin-top: 2px; }
    .admin-refresh-btn {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .admin-refresh-btn:hover { background: rgba(255,255,255,0.3); }
    .admin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .admin-stat-card {
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.05);
      position: relative;
      overflow: hidden;
    }
    .admin-stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: 12px 12px 0 0;
    }
    .admin-stat-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .admin-stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .admin-stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }
    .admin-stat-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .admin-section {
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.04);
    }
    .admin-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid var(--border);
    }
    .admin-section-header .section-icon {
      font-size: 1.1rem;
    }
    .admin-section-header .section-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      background: #eff6ff;
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
      letter-spacing: 0.03em;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
      font-size: 14px;
      color: var(--text);
      background: #ffffff;
      border-radius: 8px;
    }
    .admin-table th, .admin-table td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .admin-table th {
      background: #f1f5f9;
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .admin-table tr:nth-child(even) { background: #f8fafc; }
    .admin-table tr:hover { background: #eff6ff; }
    /* Role bar chart */
    .admin-role-chart {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      padding: 12px 0 0;
      min-height: 100px;
    }
    .admin-role-col-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .admin-role-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .admin-role-pct {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .admin-role-bar {
      background: var(--accent);
      border-radius: 5px 5px 0 0;
      width: 100%;
      min-height: 6px;
      transition: height 0.5s cubic-bezier(.4,1,.6,1);
      box-shadow: 0 2px 6px rgba(37,99,235,0.15);
    }
    .admin-role-label {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
      word-break: break-word;
      line-height: 1.3;
    }
    .admin-role-icon { font-size: 1.1rem; }
    /* Feature rating rows */
    .admin-feature-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .admin-feature-row:last-child { border-bottom: none; }
    .admin-feature-icon { font-size: 1.1rem; flex-shrink: 0; }
    .admin-feature-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      min-width: 0;
    }
    .admin-feature-bar-wrap {
      width: 120px;
      flex-shrink: 0;
      height: 7px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .admin-feature-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s;
    }
    .admin-feature-score {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      min-width: 36px;
      text-align: right;
    }
    .admin-feature-count {
      font-size: 11px;
      color: var(--muted);
      min-width: 38px;
      text-align: right;
    }
    /* Task progress bars */
    .admin-task-row {
      margin-bottom: 14px;
    }
    .admin-task-row:last-child { margin-bottom: 0; }
    .admin-task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .admin-task-label {

// ── LOCAL STORAGE ─────────────────────────────────────
function saveSurvey() {
  localStorage.setItem(LS_KEY, JSON.stringify(survey));
}
function loadSurvey() {
  const raw = localStorage.getItem(LS_KEY);
  if (!raw) return null;
  try {
    const data = JSON.parse(raw);
    if (data && typeof data === "object" && data.currentStep) {
      return data;
    }
  } catch {}
  return null;
}
function clearSurvey() {
  localStorage.removeItem(LS_KEY);
}

// ── STEP NAVIGATION ───────────────────────────────────
function goToStep(n) {
  survey.currentStep = n;
  saveSurvey();
  render();
}
function nextStep() {
  if (survey.currentStep < survey.totalSteps) {
    survey.currentStep++;
    saveSurvey();
    render();
  }
}
function prevStep() {
  if (survey.currentStep > 1) {
    survey.currentStep--;
    saveSurvey();
    render();
  }
}

// ── RESUME BANNER ─────────────────────────────────────
function checkResume() {
  const saved = loadSurvey();
  if (saved && saved.currentStep && saved.currentStep < 7) {
    survey = saved;
    resumeBanner = true;
  }
}
function handleResume() {
  resumeBanner = false;
  render();
}
function handleStartOver() {
  survey = getInitialSurvey();
  resumeBanner = false;
  saveSurvey();
  render();
}

function render() {
  const app = document.getElementById("app");
  if (!app) return;
  app.innerHTML = "";
  // Logo/branding
  app.appendChild(renderLogo());
  // Progress bar
  if (!isAdmin()) {
    app.appendChild(renderProgressBar());
    app.appendChild(renderStepIndicator());
  }
  // Resume banner
  if (resumeBanner) {
    app.appendChild(renderResumeBanner());
    return;
  }
  // Back button
  if (survey.currentStep > 1 && !isAdmin()) {
    app.appendChild(renderBackBtn());
  }
  // Step content
  if (isAdmin()) {
    renderAdmin(app);
    return;
  }
  const stepDiv = document.createElement("div");
  stepDiv.className = "step";
  switch (survey.currentStep) {
    case 1: stepDiv.appendChild(renderWelcome()); break;
    case 2: stepDiv.appendChild(renderRole()); break;
    case 3: stepDiv.appendChild(renderTour()); break;
    case 4: stepDiv.appendChild(renderTasks()); break;
    case 5: stepDiv.appendChild(renderRatings()); break;
    case 6: stepDiv.appendChild(renderFeedback()); break;
    case 7: stepDiv.appendChild(renderThankYou()); break;
    default: stepDiv.appendChild(renderWelcome()); break;
  }
  app.appendChild(stepDiv);
}

async function generateAISummary() {
  const payload = {
    role: ROLES.find(r=>r.key===survey.role)?.title || survey.role || "",
    tasks: {
      task1: survey.tasks.task1,
      task2: survey.tasks.task2,
      task3: survey.tasks.task3
    },
    ratings: survey.ratings,
    overall: survey.overall,
    whatWorked: survey.whatWorked,
    whatNeeded: survey.whatNeeded,
    wouldUse: ["Yes, regularly","Yes, occasionally","Probably not","No"][survey.wouldUse||0] || ""
  };

  try {
    const response = await fetch("/.netlify/functions/generate-summary", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(errorText || `Summary request failed with ${response.status}`);
    }

    const data = await response.json();
    return data.summary || "(No summary generated)";
  } catch (e) {
    console.error("AI summary failed:", e);
    return "(Could not generate summary. Check that the Netlify function is deployed and OPENAI_API_KEY is set in Netlify environment variables.)";
  }
}

function animateCount(id, end) {
  const el = document.getElementById(id);
  if (!el) return;
  let start = 0;
  const isFloat = String(end).includes(".");
  const step = () => {
    start += (end-start)*0.2+0.1;
    if ((isFloat && start+0.05 >= end) || (!isFloat && start+1 >= end)) {
      el.textContent = end;
      return;
    }
    el.textContent = isFloat ? start.toFixed(1) : Math.round(start);
    requestAnimationFrame(step);
  };
  step();
}

    // ── Task completion ──
    html += `<div class='admin-section'>
      <div class='admin-section-header'>
        <span class='section-icon'>📋</span> Task Completion — "Completed Easily" Rate
      </div>
      ${taskStats.map((pct,i)=>`
        <div class='admin-task-row'>
          <div class='admin-task-header'>
            <span class='admin-task-label'>Task ${i+1}: ${taskNames[i]||""}</span>
            <span class='admin-task-pct'>${pct}%</span>
          </div>
          <div class='admin-task-progress'>
            <div class='admin-task-progress-fill' style='width:${pct}%'></div>
          </div>
          <div class='admin-task-desc'>${data.filter(r=>{ try{return JSON.parse(r[`task${i+1}_result`]).completed===0;}catch{return false;} }).length} out of ${total} respondents completed this easily</div>
        </div>
      `).join("")}
    </div>`;

    // ── AI Summaries ──
    const validSummaries = summaries.filter(s=>s.summary && s.summary.trim().length>10);
    if (validSummaries.length) {
      html += `<div class='admin-section'>
        <div class='admin-section-header'>
          <span class='section-icon'>🤖</span> Recent AI-Generated Summaries
          <span class='section-badge'>last ${validSummaries.length}</span>
        </div>
        ${validSummaries.map(s=>{
          const role = ROLES.find(r=>r.key===s.role);
          return `<div class='admin-summary-card'>
            <div class='admin-summary-card-header'>
              <span>${role?role.icon:""}</span>
              <span class='admin-summary-role'>${role?role.title:s.role}</span>
              <span class='admin-summary-idx'>Response #${s.idx}</span>
            </div>
            <div class='admin-summary-text'>${s.summary||"<em style='color:#94a3b8'>No summary generated</em>"}</div>
          </div>`;
        }).join("")}
      </div>`;
    }

    // ── Raw responses ──
    html += `<div class='admin-section'>
      <div class='admin-section-header'>
        <span class='section-icon'>📊</span> Raw Response Data
        <span class='section-badge'>${total} rows</span>
      </div>
      <div style='overflow-x:auto;max-width:100%;'>
        <table class='admin-table'>
          <tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr>
          ${data.map(r=>`<tr>${headers.map(h=>`<td>${r[h]||""}</td>`).join("")}</tr>`).join("")}
        </table>
      </div>
      <button class='admin-download-btn' onclick='downloadCSV()'>⬇ Download CSV</button>
    </div>`;

    content.innerHTML = html;
  }).catch(()=>{
    const content = document.getElementById('admin-content');
    if (content) content.innerHTML = `<div class='admin-no-data'><div class='no-data-icon'>⚠️</div><b>Could not load data.</b><br>Check that <code>SHEET_CSV_URL</code> is configured correctly.</div>`;
  });
  // Auto-refresh
  setTimeout(()=>{ if(isAdmin()) render(); }, 60000);
}
function downloadCSV() {
  fetch(CONFIG.SHEET_CSV_URL).then(r=>r.text()).then(csv=>{
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gate_sofia_responses.csv';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  });
}

// ── INIT ──────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  if (window.location.search.includes("admin=true")) {
    // Admin mode — always require login
    showAdminPasswordModal();
    return;
  } else {
    checkResume();
  }
  render();
});

// Keyboard navigation
window.addEventListener("keydown", e => {
  if (resumeBanner) return;
  if (document.activeElement && ["TEXTAREA","INPUT"].includes(document.activeElement.tagName)) return;
  if (e.key === "Enter") {
    if (survey.currentStep === 1) nextStep();
    else if (survey.currentStep === 2 && survey.role) nextStep();
  }
});

// Admin password modal
function showAdminPasswordModal() {
  const app = document.getElementById("app");
  app.innerHTML = `<div class='admin-password-modal'><div class='admin-password-box'><div style='font-size:1.2rem;font-weight:600;margin-bottom:8px;color:var(--text);'>Admin Login</div><input type='password' id='admin_pw' placeholder='Password' autocomplete='current-password' /><button class='button' onclick='checkAdminPassword()'>Login</button><div id='admin_pw_err' class='admin-password-error'></div></div></div>`;
  document.getElementById('admin_pw').focus();
}
function checkAdminPassword() {
  const pw = document.getElementById('admin_pw').value;
  if (pw === CONFIG.ADMIN_PASSWORD) {
    sessionStorage.setItem("admin_ok", "1"); // used only to hand off from modal to render()
    render();
  } else {
    document.getElementById('admin_pw_err').textContent = "Incorrect password.";
  }
}
function isAdmin() {
  return window.location.search.includes("admin=true") && sessionStorage.getItem("admin_ok");
}
// Clear admin flag on every unload so login is required each visit
window.addEventListener("beforeunload", () => sessionStorage.removeItem("admin_ok"));
  </script>
</body>
</html>
